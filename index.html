<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kagaaz.</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* ===== ROOT ===== */
:root{
  --bg:#f6f3ee;
  --text:#0f0f0f;
  --muted:#7a7266;
  --accent:#8b7355;
  --border:rgba(0,0,0,0.05);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* ===== PAGE ===== */
.page{display:none;height:100vh;}
.page.active{display:flex;flex-direction:column;}

/* ===== HEADER ===== */
.header{
  padding:22px 18px 0;
}

.logo{
  font-size:22px;
  font-weight:600;
}

.tag{
  font-size:10px;
  color:var(--muted);
  margin-top:4px;
}

/* ===== HOME ===== */
.home{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* HERO */
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
  padding:0 20px;
}

.text-group{
  max-width:520px;
}

.text-group h1{
  font-size:30px;
  font-weight:500;
  line-height:1.2;
  margin-bottom:10px;
}

.text-group p{
  font-size:14px;
  color:var(--muted);
}

.cta-wrap{
  margin-top:10px;
}

.cta{
  border:1px solid var(--accent);
  padding:14px 26px;
  background:transparent;
  cursor:pointer;
  transition:.2s;
}

.cta:hover{
  transform:scale(1.05);
}

.trust{
  font-size:11px;
  color:var(--muted);
}

/* FOOTER */
.footer{
  display:flex;
  justify-content:space-between;
  padding:14px 18px;
  font-size:11px;
  opacity:.6;
}

/* ===== TOOL ===== */
.app{
  display:flex;
  flex-direction:column;
}

.left{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input,select{
  padding:12px;
  border:1px solid var(--border);
  background:white;
  font-size:13px;
}

.btn{
  padding:12px;
  border:1px solid var(--accent);
  background:transparent;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{transform:scale(1.03);}
.btn:active{transform:scale(0.95);}

.right{
  padding:30px;
  overflow:auto;
}

.invoice{
  background:white;
  padding:38px;
  border:1px solid var(--border);
  max-width:820px;
  margin:auto;
}

/* HEADER */
.inv-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:32px;
}

.inv-title{
  font-size:22px;
  font-weight:600;
}

.meta{
  font-size:12px;
  color:var(--muted);
  text-align:right;
}

/* PARTIES */
.parties{
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

.small{font-size:11px;color:var(--muted);}
.bold{font-size:14px;font-weight:500;}

/* TABLE */
.table-head,.table-row{
  display:grid;
  grid-template-columns:2fr 3fr 2fr 1fr;
  padding:12px 0;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

/* TOTAL */
.total{
  margin-top:30px;
  width:260px;
  margin-left:auto;
}

.total div{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.final{
  font-weight:600;
  font-size:16px;
}

/* ===== DESKTOP ===== */
@media(min-width:900px){

  .hero{
    justify-content:center;
    align-items:flex-start;
    padding:0 80px;
  }

  .text-group{
    max-width:600px;
  }

  .text-group h1{
    font-size:42px;
  }

  .cta-wrap{margin-top:24px;}
  .trust{margin-top:14px;}

  .app{
    flex-direction:row;
    height:100vh;
  }

  .left{
    width:320px;
    border-right:1px solid var(--border);
  }

  .right{
    flex:1;
  }
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<div class="home">

<header class="header">
<div class="logo">kagaaz.</div>
<div class="tag">THE MINIMAL INVOICE EDITOR</div>
</header>

<div class="hero">

<div class="text-group">
<h1>invoices shouldn’t take effort.</h1>
<p>generate clean invoices instantly. no setup. no friction.</p>
</div>

<div class="cta-wrap">
<button class="cta" onclick="goTool()">create invoice</button>
</div>

<div class="trust">
instant invoice. clean export. zero friction.
</div>

</div>

<footer class="footer">
<div>kagaaz.</div>
<div>built by Krhhzv Mukherjee</div>
</footer>

</div>
</div>

<!-- TOOL -->
<div id="tool" class="page">
<div class="app">

<div class="left">

<button class="btn" onclick="goHome()">← back</button>

<input id="from" placeholder="from">
<input id="to" placeholder="to">

<input id="invNo" placeholder="invoice number">
<input id="date" type="date">

<select id="currency">
<option value="₹">INR</option>
<option value="$">USD</option>
<option value="€">EUR</option>
</select>

<div id="items"></div>
<button class="btn" onclick="addItem()">+ add service</button>

<input id="gst" type="number" placeholder="GST %">
<input id="adv" type="number" placeholder="advance %">

<button class="btn" onclick="downloadPNG(event)">download PNG</button>
<button class="btn" onclick="downloadPDF(event)">download PDF</button>

</div>

<div class="right">

<div id="invoice" class="invoice">

<div class="inv-header">
<div class="inv-title">kagaaz.</div>
<div class="meta">
<div id="invPreview"></div>
<div id="datePreview"></div>
</div>
</div>

<div class="parties">
<div>
<div class="small">from</div>
<div id="fromP" class="bold"></div>
</div>
<div>
<div class="small">to</div>
<div id="toP" class="bold"></div>
</div>
</div>

<div class="table-head">
<div>service</div>
<div>details</div>
<div>link</div>
<div>price</div>
</div>

<div id="table"></div>

<div class="total">
<div><span>subtotal</span><span id="sub"></span></div>
<div><span>gst</span><span id="gstOut"></span></div>
<div><span>advance</span><span id="advOut"></span></div>
<div class="final"><span>total</span><span id="total"></span></div>
</div>

</div>

</div>

</div>
</div>

<script>

/* NAV */
function goTool(){
  home.classList.remove("active");
  tool.classList.add("active");
}

function goHome(){
  tool.classList.remove("active");
  home.classList.add("active");
}

/* AUTO */
invNo.value="KGZ-"+Math.floor(1000+Math.random()*9000);
date.value=new Date().toISOString().split("T")[0];

/* ITEMS */
let items=[];

function addItem(){
  items.push({name:"",desc:"",link:"",price:0});
  renderInputs();
}

function renderInputs(){
  let html="";
  items.forEach((i,index)=>{
    html+=`
    <input placeholder="service" oninput="items[${index}].name=this.value;update()">
    <input placeholder="details" oninput="items[${index}].desc=this.value;update()">
    <input placeholder="link" oninput="items[${index}].link=this.value;update()">
    <input type="number" placeholder="price" oninput="items[${index}].price=this.value;update()">
    `;
  });
  itemsDiv.innerHTML=html;
}

/* UPDATE */
function update(){
  let cur=currency.value;
  let subtotal=0;
  let html="";

  items.forEach(i=>{
    subtotal+=Number(i.price||0);
    html+=`
    <div class="table-row">
      <div>${i.name||"-"}</div>
      <div>${i.desc||"-"}</div>
      <div>${i.link?`<a href="${i.link}" target="_blank">view</a>`:"-"}</div>
      <div>${cur}${i.price||0}</div>
    </div>`;
  });

  let gst=subtotal*(gst.value||0)/100;
  let adv=subtotal*(adv.value||0)/100;
  let total=subtotal+gst;

  table.innerHTML=html;
  sub.innerText=cur+subtotal;
  gstOut.innerText=cur+gst.toFixed(2);
  advOut.innerText=cur+adv.toFixed(2);
  total.innerText=cur+total.toFixed(2);

  fromP.innerText=from.value||"-";
  toP.innerText=to.value||"-";

  invPreview.innerText="invoice #"+invNo.value;
  datePreview.innerText=new Date(date.value).toLocaleDateString("en-IN");
}

/* DOWNLOAD */
function downloadPNG(){
  html2canvas(invoice,{scale:2}).then(c=>{
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="invoice.png";
    a.click();
  });
}

function downloadPDF(){
  html2canvas(invoice,{scale:2}).then(c=>{
    const pdf=new jspdf.jsPDF("p","mm","a4");
    const w=210;
    const h=(c.height*w)/c.width;
    pdf.addImage(c.toDataURL(),"PNG",0,0,w,h);
    pdf.save("invoice.pdf");
  });
}

/* INIT */
const itemsDiv=document.getElementById("items");
document.addEventListener("input",update);
addItem();

</script>

</body>
</html>
